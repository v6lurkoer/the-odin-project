<!DOCTYPE html>

<html lang="en">
  <head>
    <title>Calcoolator</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>le Calcoolator</h1>
      </div>
      <div class="calculator">
        <div class="frame">
          <div class="upper-section">
            <div class="display">
              <p class="text">0</p>
            </div>
            <div class="clear"><button>C</button></div>
          </div>
          <div class="lower-section">
            <div class="numbers">
              <div class="row">
                <div class="number nine"><button>9</button></div>
                <div class="number eight"><button>8</button></div>
                <div class="number seven"><button>7</button></div>
              </div>
              <div class="row">
                <div class="number six"><button>6</button></div>
                <div class="number five"><button>5</button></div>
                <div class="number four"><button>4</button></div>
              </div>
              <div class="row">
                <div class="number three"><button>3</button></div>
                <div class="number two"><button>2</button></div>
                <div class="number one"><button>1</button></div>
              </div>
              <div class="row">
                <div class="number zero"><button>0</button></div>
              </div>
            </div>
            <div class="operators">
              <div class="operator"><button>/</button></div>
              <div class="operator"><button>×</button></div>
              <div class="operator"><button>-</button></div>
              <div class="operator"><button>+</button></div>
              <div class="operator"><button>=</button></div>
            </div>
          </div>
        </div>
      </div>
      <div class="footer">
        <p>Made with the guidance of <a href="https://www.theodinproject.com/" target="_blank">The Odin Project</a> <3</p>
      </div>
    </div>
  </body>
</html>
