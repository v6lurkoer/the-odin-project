<!DOCTYPE html>

<html lang="en">
  <head>
    <title>Calcoolator</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>le Calcoolator</h1>
      </div>
      <div class="calculator">
        <div class="frame">
          <div class="upper-section">
            <div class="display">403</div>
            <div class="clear"><button>C</button></div>
          </div>
          <div class="lower-section">
            <div class="numbers">
              <div class="row">
                <div class="number"><button>9</button></div>
                <div class="number"><button>8</button></div>
                <div class="number"><button>7</button></div>
              </div>
              <div class="row">
                <div class="number"><button>6</button></div>
                <div class="number"><button>5</button></div>
                <div class="number"><button>4</button></div>
              </div>
              <div class="row">
                <div class="number"><button>3</button></div>
                <div class="number"><button>2</button></div>
                <div class="number"><button>1</button></div>
              </div>
              <div class="row">
                <div class="number"><button>0</button></div>
              </div>
            </div>
            <div class="operators">
              <div class="operator"><button>/</button></div>
              <div class="operator"><button>*</button></div>
              <div class="operator"><button>-</button></div>
              <div class="operator"><button>+</button></div>
              <div class="operator"><button>=</button></div>
            </div>
          </div>
        </div>
      </div>
      <div class="footer">
        <p>Made with the guidance of <a href="https://www.theodinproject.com/" target="_blank">The Odin Project</a> <3</p>
      </div>
    </div>
  </body>
</html>
